<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matt Code • DoaaShow Image Cleanup</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #eee; margin:0; padding:20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #ffcc00; text-align:center; }
        .card { background:#1f1f1f; border-radius:12px; padding:24px; margin:20px 0; box-shadow:0 4px 15px rgba(0,0,0,0.6); }
        img { max-width:100%; border-radius:10px; margin:12px 0; }
        .bg { border:4px solid #ff8800; }
        .keep { border:4px solid #00ff88; }
        pre { background:#111; padding:16px; border-radius:8px; overflow:auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧹 Matt Code / DoaaShow Image Cleanup Artifact</h1>
    <p style="text-align:center;">Generated for callmecoffee3</p>

    <div class="card">
        <h2>Summary</h2>
        <p><strong>Background:</strong> Coffee.png<br>
           <strong>Main keep:</strong> Turntable Heroes image</p>
    </div>

    <div class="card bg">
        <h2>Background Image</h2>
        <img src="https://raw.githubusercontent.com/callmecoffee3/doaashow/main/Coffee.png" alt="Coffee">
    </div>

    <div class="card keep">
        <h2>Main Image</h2>
        <img src="https://raw.githubusercontent.com/callmecoffee3/doaashow/main/Gemini_Generated_Image_simarisimarisima.png" alt="Main">
    </div>

    <div class="card">
        <h2>Matt Code Example</h2>
        <pre>@page :background Coffee.png</pre>
    </div>
</div>
</body>
</html>
